<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="description" content="A deep-space purple portfolio built for GitHub Pages.">
  <title>Portfolio</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <!-- Space background -->
  <div class="space-background" aria-hidden="true">
    <div class="stars" id="stars"></div>
    <div class="mouse-trail" id="mouse-trail"></div>
    <div class="space-glow glow-left"></div>
    <div class="space-glow glow-right"></div>
    <div class="nebula nebula-left"></div>
    <div class="nebula nebula-right"></div>
    <div class="space-haze"></div>
    <div class="starburst starburst-left"></div>
    <div class="starburst starburst-middle"></div>
    <div class="starburst starburst-right"></div>
    <div class="dark-cloud cloud-left"></div>
    <div class="dark-cloud cloud-right"></div>
  </div>

<!-- Floating navigation -->
<header class="floating-nav">

  <a href="#home" class="nav-brand">
    <span class="brand-orbit"></span>
  </a>

  <nav class="nav-links">
    <a href="#home" class="active">Home</a>
    <a href="#experience">Experience</a>
    <a href="#skills">Skills</a>
    <a href="#achievements">Achievements</a>
    <a href="#activities">Activities</a>
    <a href="#contact">Contact</a>
  </nav>

</header>
  
  <main>
    <!-- Home section -->
    <section class="hero" id="home">
      <div class="hero-copy">
        <p class="eyebrow">JOEY'S PORTFOLIO</p>
        <h1>Sarawin Chandraprasert</h1>
        <p class="hero-text">Digital Industry Intergration | College of Arts, Media and Technology</p>
        <div class="hero-actions" aria-label="Hero actions">
          <a class="button primary" href="#work">View Experience</a>
          <a class="button secondary" href="#contact">Start Contact</a>
        </div>
      </div>
    </section>

  </main>
  <script src="script.js"></script>
</body>
</html>
